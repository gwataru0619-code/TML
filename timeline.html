<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 文字化けを防ぐために、日本語向けの文字コードUTF-8を指定 -->
    <meta charset="UTF-8" />
    <!-- スマホ表示のときに、画面幅に合わせてレイアウトを調整 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ブラウザのタブに表示されるページ名 -->
    <title>年表 | TYPEMOON資料館</title>
    <!-- 共通デザインを読み込むCSSファイル -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ページ上部の見出しエリア -->
    <header class="site-header">
      <!-- このページのタイトル -->
      <h1>年表</h1>
      <!-- タイトルの補足説明 -->
      <p>主要作品にまつわる出来事の流れ</p>
    </header>

    <!-- ページのメインコンテンツ -->
    <main class="container">
      <!-- 年表を1つのカードとして表示するエリア -->
      <section class="content-card">
        <!-- 順番が大切な情報なので、番号付きリスト（ol）を使う -->
        <ol class="timeline">
          <li>
            <!-- 出来事の年 -->
            <span class="year">2000年</span>
            <!-- その年の出来事 -->
            <p>同人サークルとして活動を開始。</p>
          </li>
          <li>
            <span class="year">2004年</span>
            <p>『Fate/stay night』発売。</p>
          </li>
          <li>
            <span class="year">2011年</span>
            <p>『Fate/Zero』アニメ放送開始。</p>
          </li>
          <li>
            <span class="year">2015年</span>
            <p>『Fate/Grand Order』サービス開始。</p>
          </li>
        </ol>
      </section>

      <!-- トップページへ戻るためのリンク -->
      <p><a class="back-link" href="index.html">トップページへ戻る</a></p>
    </main>
  </body>
</html>
