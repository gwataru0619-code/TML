<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 文字化けを防ぐために、日本語向けの文字コードUTF-8を指定 -->
    <meta charset="UTF-8" />
    <!-- スマホ表示のときに、画面幅に合わせてレイアウトを調整 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ブラウザのタブに表示されるページ名 -->
    <title>年表 | TYPE-MOON資料館</title>
    <!-- キャッシュを使いにくくして、更新反映を早めるための設定です -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- 共通デザインを読み込むCSSファイル -->
    <link rel="stylesheet" href="style.css?v=20260430-2" />
  </head>
  <body>
    <!-- 画面上端のハンバーガーメニューです（共通JSで生成します） -->
    <div id="site-menu"></div>
    <!-- ページ上部の見出しエリア -->
    <header class="site-header">
      <!-- このページのタイトル -->
      <h1>年表</h1>
      <!-- タイトルの補足説明 -->
      <p>主要作品にまつわる出来事の流れ</p>
    </header>

    <!-- ページのメインコンテンツ -->
    <!-- timeline-container を追加すると、年表ページだけ横幅を広めに使えます -->
    <main class="container timeline-container">
      <!-- 年表を1つのカードとして表示するエリア -->
      <section class="content-card">
        <!-- iframeは、外部サイトのページをこの場所に埋め込んで表示するタグです -->
        <div class="timeline-embed-wrapper">
          <iframe
            class="timeline-embed"
            src="https://app.the-timeline.jp/2PACX-1vRE0ZSXik0LmziAh2p5H5eRO2KsecphF0FLVixWdXP5tI14m_UyJlFgI7j0eaZpQUnYU3VW0KcdCUq4"
            title="TYPE-MOON年表"
            loading="lazy"
            allowfullscreen
          ></iframe>
        </div>

        <!-- もし埋め込みが表示されない環境でも、直接ページを開けるリンクを用意します -->
        <p>
          <a
            class="timeline-source-link"
            href="https://app.the-timeline.jp/2PACX-1vRE0ZSXik0LmziAh2p5H5eRO2KsecphF0FLVixWdXP5tI14m_UyJlFgI7j0eaZpQUnYU3VW0KcdCUq4"
            target="_blank"
            rel="noopener noreferrer"
            >年表を別タブで開く</a
          >
        </p>
      </section>

      <!-- トップページへ戻るためのリンク -->
      <p><a class="back-link" href="index.html?v=20260424-5">トップページへ戻る</a></p>
    </main>
    <!-- 共通ハンバーガーメニューを生成するJavaScriptを読み込みます -->
    <script src="menu.js?v=20260424-5"></script>
  </body>
</html>
