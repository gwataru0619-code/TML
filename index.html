<!DOCTYPE html>
<html lang="ja">
<head>

  <title>自己紹介ページ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="container">
      <p class="tag">WELCOME</p>
      <h1>こんにちは、山田 太郎です。</h1>

    <section class="card">
      <h2>目標</h2>
      <p>
        使いやすくて見やすいWebページを作れるエンジニアになることです。
        小さな改善を積み重ねながら、実装力を高めていきます。
      </p>
    </section>

    <section class="card contact">
      <h2>連絡先</h2>
      <p>メール：sample@example.com</p>
      <p>X（旧Twitter）：@sample_account</p>
    </section>
  </main>

</html>
