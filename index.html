<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 文字化けを防ぐため、文字コードをUTF-8に指定します -->
    <meta charset="UTF-8" />
    <!-- スマホでも見やすい幅にするための設定です -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ブラウザに「できるだけ最新を再取得してね」と伝えるキャッシュ対策です -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <!-- 古いブラウザ向けの追加キャッシュ対策です -->
    <meta http-equiv="Pragma" content="no-cache" />
    <!-- キャッシュの有効期限を0にして更新を優先させます -->
    <meta http-equiv="Expires" content="0" />
    <!-- ブラウザのタブに表示されるページ名です -->
    <title>TYPE-MOON資料館</title>
    <!-- ?v=... を付けると、古いCSSキャッシュではなく最新ファイルを読み込みやすくなります -->
    <link rel="stylesheet" href="style.css?v=20260430-2" />
  </head>
  <body>
    <!-- サイトの最上部に表示する見出しエリアです -->
    <header class="site-header">
      <h1>TYPE-MOON資料館</h1>
      <p>作品世界を知るための入口</p>
    </header>

    <!-- ページの主要コンテンツを入れる領域です -->
    <main class="container">
      <!-- 最初の画面で選べるメニューを並べています -->
      <section class="menu-grid" aria-label="メインメニュー">
        <!-- 用語集ページへ移動するリンクカードです -->
        <a class="menu-card" href="glossary.html?v=20260424-5">
          <h2>用語集</h2>
          <p>世界観で使われる基本用語を確認できます。</p>
        </a>

        <!-- 年表ページへ移動するリンクカードです -->
        <a class="menu-card" href="timeline.html?v=20260424-5">
          <h2>年表</h2>
          <p>主な出来事を時系列で一覧できます。</p>
        </a>

        <!-- 作品ライブラリページへ移動するリンクカードです -->
        <a class="menu-card" href="works.html?v=20260424-5">
          <h2>作品ライブラリ</h2>
          <p>作品データを一覧で確認できます。</p>
        </a>

        <!-- キャラクター一覧ページへ移動するリンクカードです -->
        <a class="menu-card" href="characters.html?v=20260424-5">
          <h2>キャラクター一覧</h2>
          <p>登場キャラクターのプロフィールを確認できます。</p>
        </a>
      </section>
    </main>
    <!-- menu.js はハンバーガーメニューの開閉処理を担当します -->
    <script src="menu.js?v=20260424-5"></script>
  </body>
</html>
