<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 文字コードをUTF-8に設定して、日本語が正しく表示されるようにします -->
    <meta charset="UTF-8" />
    <!-- スマホ表示で見やすくするための設定です -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ブラウザが古いHTMLを使い続けないようにするキャッシュ対策です -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- ブラウザのタブに表示されるページ名です -->
    <title>用語集 | TYPE-MOON資料館</title>
    <!-- GitHub Pagesのキャッシュ対策として、末尾にバージョン番号を付けます -->
    <link rel="stylesheet" href="style.css?v=20260424-10" />
  </head>
  <body>
    <!-- このheaderはページ上部のタイトルエリアです -->
    <header class="site-header">
      <!-- h1はそのページで一番重要な見出しです -->
      <h1>用語集</h1>
      <!-- ページの補足説明です -->
      <p>TYPE-MOON世界の基礎用語</p>
    </header>

    <!-- mainはこのページの中心となるコンテンツ領域です -->
    <main class="container">
      <section class="content-card">
        <!-- 表示モード切り替えボタンです -->
        <div class="glossary-mode-switch" role="group" aria-label="表示モード切り替え">
          <button
            type="button"
            class="glossary-mode-button is-active"
            data-mode-button="by-material"
          >
            マテリアル別に表示
          </button>
          <button type="button" class="glossary-mode-button" data-mode-button="by-term">
            単語別に表示
          </button>
        </div>

        <!-- 作品ライブラリと同じ操作感で、検索とカテゴリ絞り込みを用意します -->
        <div class="works-controls" aria-label="用語集の検索と絞り込み">
          <div class="works-controls-row">
            <label class="works-control-label" for="glossary-search-input">
              検索
              <input
                id="glossary-search-input"
                type="search"
                placeholder="マテリアル名・単語名・説明文・カテゴリで検索"
              />
            </label>
            <label class="works-control-label" for="glossary-material-category-select">
              マテリアルカテゴリ
              <select id="glossary-material-category-select">
                <option value="all">すべてのマテリアルカテゴリ</option>
              </select>
            </label>
            <label class="works-control-label" for="glossary-term-category-select">
              単語カテゴリ
              <select id="glossary-term-category-select">
                <option value="all">すべての単語カテゴリ</option>
              </select>
            </label>
          </div>
        </div>

        <!-- 一覧と詳細パネルを横並びで表示します（狭い画面では縦並び） -->
        <div class="works-layout">
          <div>
            <!-- JavaScriptで一覧カードを描画する領域です -->
            <div id="glossary-list" class="works-grid"></div>
            <p id="glossary-empty-message" class="works-empty" hidden>
              条件に一致する項目はありません。
            </p>
          </div>

          <!-- 右側に表示する詳細パネルです -->
          <aside id="glossary-detail-panel" class="work-detail-panel is-empty" aria-live="polite">
            <div class="work-detail-header">
              <h2 id="glossary-detail-title">項目を選択してください</h2>
              <button
                id="glossary-close-panel-button"
                class="close-panel-button"
                type="button"
                disabled
              >
                閉じる
              </button>
            </div>
            <p id="glossary-detail-meta" class="work-meta">左の一覧から名前を押すと詳細が表示されます。</p>
            <div id="glossary-detail-content" class="glossary-detail-content">
              <p class="relation-empty">現在はまだ項目が選択されていません。</p>
            </div>
          </aside>
        </div>
      </section>

      <!-- href="index.html" でトップページへ移動します -->
      <p><a class="back-link" href="index.html?v=20260424-10">トップへ戻る</a></p>
    </main>

    <script>
      // 用語データは「辞書（マテリアル）ごと」に1つの配列で管理します。
      // publicationDate / summary / categories を持ち、entries の各単語にも termCategories を持たせます。
      //
      // ▼ 1件分のデータ見本
      // {
      //   material: "辞書名（マテリアル名）",
      //   publicationDate: "YYYY-MM-DD",
      //   summary: "マテリアル自体の短い解説",
      //   categories: ["マテリアルカテゴリA", "マテリアルカテゴリB"],
      //   entries: [
      //     {
      //       term: "単語名",
      //       description: "その辞書での説明文",
      //       termCategories: ["単語カテゴリA", "単語カテゴリB"]
      //     }
      //   ]
      // }
      const glossaryMaterialsData = [
        {
          material: "Fate/stay night マテリアル",
          publicationDate: "2004-01-30",
          summary:
            "『Fate/stay night』本編の世界観を補強する基礎資料。魔術理論や聖杯戦争の前提知識を中心に収録。",
          categories: ["Fate", "ゲーム", "設定資料"],
          entries: [
            {
              term: "魔術",
              description:
                "神秘を再現するための技法。現代に残るのは本来の奇跡を模倣した技術体系。",
              termCategories: ["魔術理論", "基礎概念"]
            },
            {
              term: "聖杯戦争",
              description:
                "願望機・聖杯を巡り、7人のマスターと7騎のサーヴァントが争う儀式。",
              termCategories: ["儀式", "戦争システム"]
            },
            {
              term: "英霊",
              description:
                "人類史に功績を残し、英霊の座に記録された存在。召喚時はサーヴァントとして現界する。",
              termCategories: ["サーヴァント", "霊基"]
            },
            {
              term: "根源",
              description:
                "あらゆる事象の起点とされる究極の到達点。魔術師にとっての最終目標。",
              termCategories: ["世界観", "魔術理論"]
            }
          ]
        },
        {
          material: "Fate/Zero 用語辞典",
          publicationDate: "2011-01-11",
          summary:
            "第四次聖杯戦争の背景を理解するための用語辞典。陣営関係と儀式運用の説明が厚め。",
          categories: ["Fate", "小説", "アニメ", "設定資料"],
          entries: [
            {
              term: "魔術",
              description:
                "家系と刻印により継承される秘儀。戦闘だけでなく諜報・儀式運用も重要視される。",
              termCategories: ["魔術理論", "運用"]
            },
            {
              term: "聖杯戦争",
              description:
                "第三次までの経緯を踏まえた上で行われる第四次聖杯戦争。各陣営の思惑が複雑に交錯する。",
              termCategories: ["儀式", "戦争システム"]
            },
            {
              term: "令呪",
              description:
                "マスターがサーヴァントへ絶対命令を行使できる三画の契約証。",
              termCategories: ["契約", "サーヴァント"]
            }
          ]
        },
        {
          material: "Fate/Grand Order マテリアル",
          publicationDate: "2015-07-30",
          summary:
            "FGOにおける世界観設定を整理したマテリアル。英霊召喚と特異点修復の文脈が中心。",
          categories: ["Fate", "ゲーム", "モバイル", "設定資料"],
          entries: [
            {
              term: "英霊",
              description:
                "英霊の座に登録された霊基情報をもとに、カルデア式召喚でサーヴァントとして呼び出される。",
              termCategories: ["サーヴァント", "霊基"]
            },
            {
              term: "特異点",
              description:
                "人理の流れから逸脱した歴史上の異常点。修復しない限り未来が失われる。",
              termCategories: ["世界観", "人理修復"]
            },
            {
              term: "魔術",
              description:
                "カルデアでは魔術理論と科学技術を複合運用し、観測・修復任務を遂行する。",
              termCategories: ["魔術理論", "運用"]
            }
          ]
        },
        {
          material: "空の境界 公式パンフレット用語",
          publicationDate: "2007-12-01",
          summary:
            "『空の境界』劇場版パンフレット由来の用語群。作品内の思想や能力概念を補足する。",
          categories: ["空の境界", "劇場版", "設定資料"],
          entries: [
            {
              term: "根源",
              description:
                "渦の中心とも語られる全情報の源。通常の到達手段では接続不可能に近い。",
              termCategories: ["世界観", "魔術理論"]
            },
            {
              term: "直死の魔眼",
              description:
                "対象の死を線と点で視認し、そこをなぞることで概念的に死へ至らせる能力。",
              termCategories: ["能力", "魔眼"]
            },
            {
              term: "魔術",
              description:
                "隠匿を前提とする技法であり、日常社会との境界維持が重要な倫理として扱われる。",
              termCategories: ["魔術理論", "倫理"]
            }
          ]
        },
        {
          material: "月姫読本 Plus Period",
          publicationDate: "2004-10-22",
          summary:
            "『月姫』関連設定をまとめた読本。吸血種・魔眼・世界観の成り立ちを横断的に解説。",
          categories: ["月姫", "ゲーム", "設定資料"],
          entries: [
            {
              term: "直死の魔眼",
              description:
                "視界に映る“壊れやすさ”を直接認識する特異能力。精神状態によって見え方が大きく変化する。",
              termCategories: ["能力", "魔眼"]
            },
            {
              term: "真祖",
              description:
                "自然現象に近い吸血種。人間社会と異なる原理で活動し、固有の衝動を抱える。",
              termCategories: ["種族", "吸血鬼"]
            },
            {
              term: "根源",
              description:
                "魔術的探究の最深部だが、本作では血や衝動といった個の物語と対比される概念として描かれる。",
              termCategories: ["世界観", "魔術理論"]
            }
          ]
        }
      ];

      // モード状態（by-material / by-term）を保持します。
      let currentMode = "by-material";
      let selectedItemName = null;
      let currentSearchKeyword = "";
      let currentMaterialCategoryFilter = "all";
      let currentTermCategoryFilter = "all";

      const glossaryListElement = document.getElementById("glossary-list");
      const glossaryEmptyMessageElement = document.getElementById("glossary-empty-message");
      const glossaryDetailPanelElement = document.getElementById("glossary-detail-panel");
      const glossaryDetailTitleElement = document.getElementById("glossary-detail-title");
      const glossaryDetailMetaElement = document.getElementById("glossary-detail-meta");
      const glossaryDetailContentElement = document.getElementById("glossary-detail-content");
      const glossarySearchInputElement = document.getElementById("glossary-search-input");
      const glossaryMaterialCategorySelectElement = document.getElementById(
        "glossary-material-category-select"
      );
      const glossaryTermCategorySelectElement = document.getElementById("glossary-term-category-select");
      const glossaryClosePanelButtonElement = document.getElementById(
        "glossary-close-panel-button"
      );
      const modeButtonElements = document.querySelectorAll("[data-mode-button]");

      // 重複を削除して、日本語順に並べる共通関数です。
      function toSortedUnique(values) {
        return [...new Set(values)].sort((a, b) => a.localeCompare(b, "ja"));
      }

      // entry.termCategories が未設定でも安全に配列を返します。
      function getEntryTermCategories(entry) {
        if (!Array.isArray(entry.termCategories)) {
          return [];
        }
        return entry.termCategories;
      }

      // マテリアルカテゴリの選択肢を生成します。
      function setupMaterialCategoryOptions() {
        const categories = [...new Set(glossaryMaterialsData.flatMap((item) => item.categories))]
          .sort((a, b) => a.localeCompare(b, "ja"));
        categories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          glossaryMaterialCategorySelectElement.appendChild(option);
        });
      }

      // 単語カテゴリの選択肢を生成します。
      function setupTermCategoryOptions() {
        const termCategories = toSortedUnique(
          glossaryMaterialsData.flatMap((materialItem) =>
            materialItem.entries.flatMap((entry) => getEntryTermCategories(entry))
          )
        );
        termCategories.forEach((category) => {
          const option = document.createElement("option");
          option.value = category;
          option.textContent = category;
          glossaryTermCategorySelectElement.appendChild(option);
        });
      }

      // 単語別表示のために「単語 -> 複数辞書での説明」へ変換します。
      function buildTermMap(materialData, entryFilter = () => true) {
        const map = new Map();
        materialData.forEach((materialItem) => {
          materialItem.entries.forEach((entry) => {
            if (!entryFilter(entry, materialItem)) {
              return;
            }
            if (!map.has(entry.term)) {
              map.set(entry.term, []);
            }
            map.get(entry.term).push({
              material: materialItem.material,
              publicationDate: materialItem.publicationDate,
              summary: materialItem.summary,
              materialCategories: materialItem.categories,
              termCategories: getEntryTermCategories(entry),
              description: entry.description
            });
          });
        });
        return map;
      }

      // 日付文字列をそのまま表示し、空なら「不明」を返します。
      function displayDate(dateValue) {
        return dateValue || "不明";
      }

      function createCategoryChips(categories) {
        const wrapper = document.createElement("div");
        wrapper.className = "relation-links";
        if (categories.length === 0) {
          const empty = document.createElement("span");
          empty.className = "relation-empty";
          empty.textContent = "なし";
          wrapper.appendChild(empty);
          return wrapper;
        }
        categories.forEach((category) => {
          const chip = document.createElement("span");
          chip.className = "glossary-category-chip";
          chip.textContent = category;
          wrapper.appendChild(chip);
        });
        return wrapper;
      }

      // カテゴリ見出しとカテゴリチップをまとめて描画する関数です。
      function appendCategorySection(containerElement, titleText, categories, labelClassName) {
        const title = document.createElement("p");
        title.className = labelClassName || "relation-label";
        title.textContent = titleText;
        containerElement.appendChild(title);
        containerElement.appendChild(createCategoryChips(categories));
      }

      // マテリアルカテゴリの条件に一致するかを判定します。
      function isMaterialCategoryMatched(materialItem) {
        if (currentMaterialCategoryFilter === "all") {
          return true;
        }
        return materialItem.categories.includes(currentMaterialCategoryFilter);
      }

      // 単語カテゴリの条件に一致するかを判定します。
      function isTermCategoryMatchedForEntry(entry) {
        if (currentTermCategoryFilter === "all") {
          return true;
        }
        return getEntryTermCategories(entry).includes(currentTermCategoryFilter);
      }

      function isTermCategoryMatchedForMaterial(materialItem) {
        if (currentTermCategoryFilter === "all") {
          return true;
        }
        return materialItem.entries.some((entry) => isTermCategoryMatchedForEntry(entry));
      }

      function getMaterialTermCategories(materialItem) {
        return toSortedUnique(
          materialItem.entries.flatMap((entry) => getEntryTermCategories(entry))
        );
      }

      // マテリアル別表示用の検索判定です。
      function isMaterialSearchMatched(materialItem) {
        if (!currentSearchKeyword) {
          return true;
        }
        const searchableText = [
          materialItem.material,
          materialItem.publicationDate,
          materialItem.summary,
          materialItem.categories.join(" "),
          materialItem.entries
            .map(
              (entry) =>
                `${entry.term} ${entry.description} ${getEntryTermCategories(entry).join(" ")}`
            )
            .join(" ")
        ]
          .join(" ")
          .toLowerCase();
        return searchableText.includes(currentSearchKeyword);
      }

      function getFilteredMaterialsForMaterialMode() {
        return [...glossaryMaterialsData]
          .filter(
            (item) =>
              isMaterialCategoryMatched(item) &&
              isTermCategoryMatchedForMaterial(item) &&
              isMaterialSearchMatched(item)
          )
          .sort((a, b) => {
            const dateCompare = a.publicationDate.localeCompare(b.publicationDate);
            if (dateCompare !== 0) {
              return dateCompare;
            }
            return a.material.localeCompare(b.material, "ja");
          });
      }

      function getFilteredTermsForTermMode() {
        const materialFilteredMaterials = glossaryMaterialsData.filter((item) =>
          isMaterialCategoryMatched(item)
        );
        const termMap = buildTermMap(materialFilteredMaterials, (entry) =>
          isTermCategoryMatchedForEntry(entry)
        );

        return [...termMap.entries()]
          .map(([termName, descriptions]) => ({
            termName,
            descriptions,
            termCategories: toSortedUnique(
              descriptions.flatMap((descriptionItem) => descriptionItem.termCategories)
            ),
            materialCategories: toSortedUnique(
              descriptions.flatMap((descriptionItem) => descriptionItem.materialCategories)
            )
          }))
          .filter((termItem) => {
            if (!currentSearchKeyword) {
              return true;
            }
            const searchableText = [
              termItem.termName,
              termItem.termCategories.join(" "),
              termItem.materialCategories.join(" "),
              ...termItem.descriptions.map((descriptionItem) =>
                [
                  descriptionItem.material,
                  descriptionItem.publicationDate,
                  descriptionItem.summary,
                  descriptionItem.materialCategories.join(" "),
                  descriptionItem.termCategories.join(" "),
                  descriptionItem.description
                ].join(" ")
              )
            ]
              .join(" ")
              .toLowerCase();
            return searchableText.includes(currentSearchKeyword);
          })
          .sort((a, b) => a.termName.localeCompare(b.termName, "ja"));
      }

      // 詳細パネルを初期状態に戻します。
      function resetDetailPanel() {
        glossaryDetailTitleElement.textContent = "項目を選択してください";
        glossaryDetailMetaElement.textContent = "左の一覧から名前を押すと詳細が表示されます。";
        glossaryDetailContentElement.innerHTML =
          '<p class="relation-empty">現在はまだ項目が選択されていません。</p>';
        glossaryDetailPanelElement.classList.add("is-empty");
        glossaryClosePanelButtonElement.disabled = true;
      }

      // マテリアルを選択したときの詳細表示です。
      function showMaterialDetailPanel(materialItem) {
        glossaryDetailTitleElement.textContent = materialItem.material;
        glossaryDetailMetaElement.textContent = `出版日: ${displayDate(
          materialItem.publicationDate
        )} / 収録単語数: ${materialItem.entries.length}件`;
        glossaryDetailContentElement.innerHTML = "";

        const summary = document.createElement("p");
        summary.className = "work-detail-description";
        summary.textContent = materialItem.summary;
        glossaryDetailContentElement.appendChild(summary);

        appendCategorySection(
          glossaryDetailContentElement,
          "マテリアルカテゴリ",
          materialItem.categories
        );
        appendCategorySection(
          glossaryDetailContentElement,
          "この辞書に含まれる単語カテゴリ",
          getMaterialTermCategories(materialItem)
        );

        const list = document.createElement("dl");
        list.className = "glossary-list";

        const sortedEntries = [...materialItem.entries].sort((a, b) =>
          a.term.localeCompare(b.term, "ja")
        );
        sortedEntries.forEach((entry) => {
          const block = document.createElement("div");
          const term = document.createElement("dt");
          term.textContent = entry.term;
          const description = document.createElement("dd");
          description.textContent = entry.description;
          block.appendChild(term);
          block.appendChild(description);

          const entryTermCategories = getEntryTermCategories(entry);
          if (entryTermCategories.length > 0) {
            const entryCategoryChips = createCategoryChips(entryTermCategories);
            entryCategoryChips.classList.add("glossary-entry-chip-group");
            block.appendChild(entryCategoryChips);
          }
          list.appendChild(block);
        });
        glossaryDetailContentElement.appendChild(list);

        glossaryDetailPanelElement.classList.remove("is-empty");
        glossaryClosePanelButtonElement.disabled = false;
      }

      // 単語を選択したときの詳細表示です。
      // 「Aの辞書ではこう、Bの辞書ではこう」という比較が見える形にします。
      function showTermDetailPanel(termName, termDescriptions) {
        glossaryDetailTitleElement.textContent = termName;
        glossaryDetailMetaElement.textContent = `説明が見つかった辞書数: ${termDescriptions.length}件`;
        glossaryDetailContentElement.innerHTML = "";

        const sortedDescriptions = [...termDescriptions].sort((a, b) =>
          a.publicationDate.localeCompare(b.publicationDate)
        );

        sortedDescriptions.forEach((item) => {
          const card = document.createElement("article");
          card.className = "glossary-term-card";

          const title = document.createElement("h3");
          title.className = "glossary-term-material-title";
          title.textContent = `${item.material}（出版日: ${displayDate(item.publicationDate)}）`;
          card.appendChild(title);

          const materialSummary = document.createElement("p");
          materialSummary.className = "work-summary";
          materialSummary.textContent = item.summary;
          card.appendChild(materialSummary);

          appendCategorySection(
            card,
            "マテリアルカテゴリ",
            item.materialCategories,
            "glossary-sub-label"
          );
          appendCategorySection(card, "単語カテゴリ", item.termCategories, "glossary-sub-label");

          const description = document.createElement("p");
          description.className = "glossary-term-description";
          description.textContent = item.description;
          card.appendChild(description);

          glossaryDetailContentElement.appendChild(card);
        });

        glossaryDetailPanelElement.classList.remove("is-empty");
        glossaryClosePanelButtonElement.disabled = false;
      }

      // 現在モードの一覧を描画します（左側）。
      function renderGlossaryList() {
        glossaryListElement.innerHTML = "";
        glossaryEmptyMessageElement.hidden = true;

        if (currentMode === "by-material") {
          const filteredMaterials = getFilteredMaterialsForMaterialMode();

          filteredMaterials.forEach((materialItem) => {
            const card = document.createElement("article");
            card.className = "work-card";
            if (selectedItemName === materialItem.material) {
              card.classList.add("is-selected");
            }

            const titleButton = document.createElement("button");
            titleButton.type = "button";
            titleButton.className = "work-title-button";
            titleButton.textContent = materialItem.material;
            titleButton.addEventListener("click", () => {
              selectedItemName = materialItem.material;
              showMaterialDetailPanel(materialItem);
              renderGlossaryList();
            });
            card.appendChild(titleButton);

            const meta = document.createElement("p");
            meta.className = "work-meta";
            meta.textContent = `出版日: ${displayDate(
              materialItem.publicationDate
            )} / 収録単語数: ${materialItem.entries.length}件`;
            card.appendChild(meta);

            const preview = document.createElement("p");
            preview.className = "work-summary";
            preview.textContent = materialItem.summary;
            card.appendChild(preview);

            appendCategorySection(
              card,
              "マテリアルカテゴリ",
              materialItem.categories,
              "glossary-sub-label"
            );
            appendCategorySection(
              card,
              "単語カテゴリ",
              getMaterialTermCategories(materialItem),
              "glossary-sub-label"
            );

            glossaryListElement.appendChild(card);
          });

          if (filteredMaterials.length === 0) {
            glossaryEmptyMessageElement.hidden = false;
          }

          if (selectedItemName) {
            const selectedMaterial = filteredMaterials.find(
              (materialItem) => materialItem.material === selectedItemName
            );
            if (selectedMaterial) {
              showMaterialDetailPanel(selectedMaterial);
            } else {
              selectedItemName = null;
              resetDetailPanel();
            }
          } else {
            resetDetailPanel();
          }
          return;
        }

        const filteredTerms = getFilteredTermsForTermMode();
        filteredTerms.forEach((termItem) => {
          const { termName, descriptions, termCategories, materialCategories } = termItem;
          const card = document.createElement("article");
          card.className = "work-card";
          if (selectedItemName === termName) {
            card.classList.add("is-selected");
          }

          const titleButton = document.createElement("button");
          titleButton.type = "button";
          titleButton.className = "work-title-button";
          titleButton.textContent = termName;
          titleButton.addEventListener("click", () => {
            selectedItemName = termName;
            showTermDetailPanel(termName, descriptions);
            renderGlossaryList();
          });
          card.appendChild(titleButton);

          const meta = document.createElement("p");
          meta.className = "work-meta";
          meta.textContent = `説明がある辞書数: ${descriptions.length}件`;
          card.appendChild(meta);

          const preview = document.createElement("p");
          preview.className = "work-summary";
          preview.textContent = `掲載辞書: ${descriptions.map((item) => item.material).join(" / ")}`;
          card.appendChild(preview);

          appendCategorySection(card, "単語カテゴリ", termCategories, "glossary-sub-label");
          appendCategorySection(
            card,
            "マテリアルカテゴリ",
            materialCategories,
            "glossary-sub-label"
          );

          glossaryListElement.appendChild(card);
        });

        if (filteredTerms.length === 0) {
          glossaryEmptyMessageElement.hidden = false;
        }

        if (selectedItemName) {
          const selectedTermItem = filteredTerms.find((termItem) => termItem.termName === selectedItemName);
          if (selectedTermItem) {
            showTermDetailPanel(selectedItemName, selectedTermItem.descriptions);
          } else {
            selectedItemName = null;
            resetDetailPanel();
          }
        } else {
          resetDetailPanel();
        }
      }

      // ボタンの見た目（選択中状態）を更新します。
      function updateModeButtons() {
        modeButtonElements.forEach((button) => {
          const isActive = button.dataset.modeButton === currentMode;
          button.classList.toggle("is-active", isActive);
        });
      }

      modeButtonElements.forEach((button) => {
        button.addEventListener("click", () => {
          currentMode = button.dataset.modeButton;
          selectedItemName = null;
          updateModeButtons();
          renderGlossaryList();
        });
      });

      glossarySearchInputElement.addEventListener("input", () => {
        currentSearchKeyword = glossarySearchInputElement.value.trim().toLowerCase();
        selectedItemName = null;
        renderGlossaryList();
      });

      glossaryMaterialCategorySelectElement.addEventListener("change", () => {
        currentMaterialCategoryFilter = glossaryMaterialCategorySelectElement.value;
        selectedItemName = null;
        renderGlossaryList();
      });

      glossaryTermCategorySelectElement.addEventListener("change", () => {
        currentTermCategoryFilter = glossaryTermCategorySelectElement.value;
        selectedItemName = null;
        renderGlossaryList();
      });

      // 詳細パネルの「閉じる」ボタンです。
      glossaryClosePanelButtonElement.addEventListener("click", () => {
        selectedItemName = null;
        resetDetailPanel();
        renderGlossaryList();
      });

      setupMaterialCategoryOptions();
      setupTermCategoryOptions();
      updateModeButtons();
      resetDetailPanel();
      renderGlossaryList();
    </script>
