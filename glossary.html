<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用語集 | TYPEMOON資料館</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>用語集</h1>
      <p>TYPEMOON世界の基礎用語</p>
    </header>

    <main class="container">
      <section class="content-card">
        <dl class="glossary-list">
          <div>
            <dt>魔術</dt>
            <dd>神秘を再現するための技法。魔術師が系統や刻印を通じて扱う。</dd>
          </div>
          <div>
            <dt>聖杯戦争</dt>
            <dd>願望機・聖杯を巡ってマスターとサーヴァントが争う儀式。</dd>
          </div>
          <div>
            <dt>根源</dt>
            <dd>世界の始まりに連なる究極地点。多くの魔術師が到達を目指す。</dd>
          </div>
          <div>
            <dt>英霊</dt>
            <dd>歴史や伝承に名を残し、座に記録された英雄の霊。</dd>
          </div>
        </dl>
      </section>
      <p><a class="back-link" href="index.html">トップへ戻る</a></p>
    </main>
  </body>
</html>
