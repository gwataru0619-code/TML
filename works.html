<!DOCTYPE html>
<html lang="ja">
  <head>
    <!-- 文字化けを防ぐため、文字コードをUTF-8に指定します -->
    <meta charset="UTF-8" />
    <!-- スマホ表示のときに、画面幅に合わせてレイアウトを調整します -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- キャッシュ対策: 更新後に古いHTMLを読み込みにくくします -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- ブラウザのタブに表示されるページ名 -->
    <title>作品ライブラリ | TYPE-MOON資料館</title>
    <!-- 既存の共通デザインCSSを読み込みます -->
    <link rel="stylesheet" href="style.css?v=20260424-5" />
  </head>
  <body>
    <!-- 画面上端のハンバーガーメニューです（JavaScriptで自動生成されます） -->
    <div id="site-menu"></div>

    <!-- ページ上部の見出しエリア -->
    <header class="site-header">
      <h1>作品ライブラリ</h1>
      <p>TYPE-MOON作品を一覧で確認できます</p>
    </header>

    <main class="container">
      <section class="content-card">
        <!-- ここは検索と絞り込みの操作エリアです -->
        <div class="works-controls" aria-label="作品の検索・絞り込み・並び替え">
          <div class="works-controls-row">
            <label class="works-control-label" for="search-input">
              検索
              <input
                id="search-input"
                type="search"
                placeholder="タイトル・分類・あらすじで検索"
              />
            </label>

            <label class="works-control-label" for="category-select">
              カテゴリ
              <select id="category-select">
                <option value="all">すべて</option>
              </select>
            </label>

            <label class="works-control-label" for="sort-select">
              並び替え
              <select id="sort-select">
                <option value="releaseDateAsc">発売日が古い順</option>
                <option value="releaseDateDesc">発売日が新しい順</option>
                <option value="titleAsc">作品名 あいうえお順</option>
                <option value="titleDesc">作品名 あいうえお逆順</option>
              </select>
            </label>
          </div>
        </div>

        <!-- 左: リスト / 右: 詳細サイドパネル の2カラムレイアウトです -->
        <div class="works-layout">
          <div>
            <!-- JavaScriptで生成した作品カードを、この中に追加していきます -->
            <div id="works-list" class="works-grid"></div>
            <!-- 結果が0件のときに表示するメッセージです -->
            <p id="empty-message" class="works-empty" hidden>
              条件に一致する作品はありません。
            </p>
          </div>

          <!-- 作品名を押したときの詳細を表示するサイドパネルです -->
          <aside
            id="detail-panel"
            class="work-detail-panel is-empty"
            aria-live="polite"
          >
            <div class="work-detail-header">
              <h2 id="detail-title">作品を選択してください</h2>
              <!-- このボタンを押すと、詳細表示を閉じて初期状態に戻します -->
              <button
                id="close-panel-button"
                class="close-panel-button"
                type="button"
                disabled
              >
                閉じる
              </button>
            </div>
            <p id="detail-release-date" class="work-meta">発売日: -</p>
            <p id="detail-category" class="work-meta">分類: -</p>
            <p id="detail-summary" class="work-summary">
              左側の作品名を押すと、ここに詳細情報が表示されます。
            </p>
            <p id="detail-description" class="work-detail-description" hidden></p>

            <!-- 詳細パネルの中に、登場キャラクターへのリンクを表示します -->
            <p class="relation-label">登場キャラクター</p>
            <div id="detail-characters" class="relation-links">
              <span class="relation-empty">作品を選択すると表示されます。</span>
            </div>
          </aside>
        </div>
      </section>

      <!-- トップページへ戻るリンク -->
      <p><a class="back-link" href="index.html?v=20260424-5">トップへ戻る</a></p>
    </main>

    <script>
      // ここに作品データを「配列（JSON形式の書き方）」でまとめます。
      // 後から作品を追加したいときは、下の見本を参考にオブジェクトを1件追加してください。
      //
      // ▼ 1件分のデータ見本
      // {
      //   title: "作品タイトル",
      //   releaseDate: "YYYY-MM-DD",
      //   categories: ["ゲーム", "アニメ", "小説 など"],
      //   summary: "一覧カードに表示する短い説明です。",
      //   description: "詳細パネルに表示する説明文です。（省略可）",

      // }
      const worksData = [
        {
          title: "Fate/stay night",

          categories: ["ゲーム", "漫画", "アニメ"],
          summary:
            "聖杯戦争に巻き込まれた少年・衛宮士郎が、サーヴァントとともに戦いへ身を投じる物語。",
          description:

            　2007年4月19日 - PlayStation 2移植版『Fate/stay night [Réalta Nua]』が発売",
          characters: ["衛宮士郎", "セイバー", "遠坂凛"]
        },
        {

        {

          description:
            "『Fate/stay night』へ続く物語として、各陣営の信念と葛藤を重厚な群像劇で描いている。",
          characters: ["セイバー"]
        },
        {
          title: "Fate/EXTRA",

        {

        {

        {

        {

        {

        {

        },
        {

        {

        {

        {
          title: "月姫 -A piece of blue glass moon-",
          releaseDate: "2021-08-26",
          categories: ["ゲーム", "ビジュアルノベル"],
          summary:
            "異能の眼を持つ遠野志貴が、吸血鬼事件の渦中で自身の過去と向き合っていく伝奇作品。",
          description:
            "ビジュアル・演出を刷新したリメイク版。伝奇ホラーと青春劇の要素が融合した独特の世界観が特徴。",
          characters: ["アルクェイド・ブリュンスタッド"]
        },
        {
          title: "Fate/Grand Order",
          releaseDate: "2015-07-30",
          categories: ["ゲーム", "モバイル"],
          summary:
            "人理焼却を阻止するため、時代を超えて英霊とともに特異点を巡る長編RPG。",
          description:
            "多数のシナリオライターによる章構成で、歴史・神話の英霊たちと協力しながら世界の危機に挑む。",
          characters: [
            "衛宮士郎",
            "セイバー",

            "アルクェイド・ブリュンスタッド"
          ]
        },
        {

          releaseDate: "",

        },
        {

        },
        {

          releaseDate: "",
          categories: [],
          summary: "",
          description: "",
          characters: []
        },
        {
          title: "ロード・エルメロイII世の冒険",
          releaseDate: "",
          categories: [],
          summary: "",
          description: "",
          characters: []
        },
        {
          title: "Fate:Lost Einherjar 極光のアスラウグ",
          releaseDate: "",
          categories: [],
          summary: "",
          description: "",
          characters: []
        },
        {
          title: "空の境界",
          releaseDate: "2004-06-01",
          categories: ["小説", "劇場版"],
          summary:
            "両儀式を中心に、超常事件と人間の内面を描いた伝奇小説シリーズ。",
          description:
            "時系列が複雑に組まれた構成と、静かで鋭い文体が魅力。TYPE-MOON作品群の原点のひとつ。",
          characters: ["両儀式"]
        }
      ];

      // URLに ?work=作品名 があるとき、その作品を初期表示で開くために取得します。
      const initialQueryWorkTitle =
        new URLSearchParams(window.location.search).get("work");

      // id="works-list" の要素を取得します。
      const worksListElement = document.getElementById("works-list");
      // 検索ボックスの要素を取得します。
      const searchInputElement = document.getElementById("search-input");
      // カテゴリ選択の要素を取得します。
      const categorySelectElement = document.getElementById("category-select");
      // 並び替え選択の要素を取得します。
      const sortSelectElement = document.getElementById("sort-select");
      // 結果0件メッセージの要素を取得します。
      const emptyMessageElement = document.getElementById("empty-message");
      // 詳細サイドパネル関連の要素を取得します。
      const detailPanelElement = document.getElementById("detail-panel");
      const detailTitleElement = document.getElementById("detail-title");
      const detailReleaseDateElement = document.getElementById("detail-release-date");
      const detailCategoryElement = document.getElementById("detail-category");
      const detailSummaryElement = document.getElementById("detail-summary");
      const detailDescriptionElement = document.getElementById("detail-description");
      const detailCharactersElement = document.getElementById("detail-characters");
      const closePanelButtonElement = document.getElementById("close-panel-button");

      // いま詳細表示中の作品タイトルを保持します。
      let selectedWorkTitle = null;
      // 現在画面に表示している一覧データを保持します（選択状態の再描画に使います）。
      let currentDisplayedWorks = [];
      // 初回表示でURL指定の作品へスクロールするためのフラグです。
      let shouldScrollToSelectedWork = false;
      // URLの初期指定は1回だけ使いたいので、可変の変数に入れます。
      let pendingInitialWorkTitle = initialQueryWorkTitle;

      // 作品の分類は複数入力できるため、常に配列として扱います。
      function getWorkCategories(work) {
        if (Array.isArray(work.categories)) {
          return work.categories;
        }
        if (work.category) {
          return [work.category];
        }
        return [];
      }

      function formatWorkCategories(work) {
        const categories = getWorkCategories(work);
        return categories.length > 0 ? categories.join(" / ") : "-";
      }

      // 日付文字列を比較用の数値に変換します。
      // 日付が空欄や不正な文字列の場合は、あとで最後に並べられるよう Infinity にします。
      function getWorkDateTime(work) {
        const dateTime = new Date(work.releaseDate).getTime();
        return Number.isNaN(dateTime) ? Number.POSITIVE_INFINITY : dateTime;
      }

      // 発売日で並び替えるための比較処理です。
      // 日付が空の作品は、古い順・新しい順のどちらでも最後に置きます。
      function compareWorkReleaseDates(a, b, direction) {
        const aDateTime = getWorkDateTime(a);
        const bDateTime = getWorkDateTime(b);
        if (
          aDateTime === Number.POSITIVE_INFINITY &&
          bDateTime === Number.POSITIVE_INFINITY
        ) {
          return 0;
        }
        if (aDateTime === Number.POSITIVE_INFINITY) {
          return 1;
        }
        if (bDateTime === Number.POSITIVE_INFINITY) {
          return -1;
        }
        if (direction === "desc") {
          return bDateTime - aDateTime;
        }
        return aDateTime - bDateTime;
      }

      // 選択された並び替え条件に合わせて、作品配列を並べ替えます。
      function sortWorks(works, sortMode) {
        const sortedWorks = [...works];
        sortedWorks.sort((a, b) => {
          if (sortMode === "releaseDateDesc") {
            return compareWorkReleaseDates(a, b, "desc");
          }
          if (sortMode === "titleAsc") {
            return a.title.localeCompare(b.title, "ja");
          }
          if (sortMode === "titleDesc") {
            return b.title.localeCompare(a.title, "ja");
          }
          // 初期状態は、今までと同じ「発売日が古い順」です。
          return compareWorkReleaseDates(a, b, "asc");
        });
        return sortedWorks;
      }

      // URLパラメータの作品名を元に、検索条件を自動調整する関数です。
      function applyInitialWorkSelectionFromQuery() {
        if (!pendingInitialWorkTitle) {
          return;
        }
        const targetWork = worksData.find(
          (work) => work.title === pendingInitialWorkTitle
        );
        if (!targetWork) {
          pendingInitialWorkTitle = null;
          return;
        }
        // 該当作品が確実に表示されるように、検索欄とカテゴリをあわせて設定します。
        searchInputElement.value = targetWork.title;
        categorySelectElement.value = getWorkCategories(targetWork)[0] || "all";
      }


      // カテゴリの候補を、配列データから重複なしで取り出して作ります。
      const categories = [
        ...new Set(worksData.flatMap((work) => getWorkCategories(work)))
      ];

      // category-select にカテゴリ選択肢を追加します。
      categories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categorySelectElement.appendChild(option);
      });

      // 指定されたリンク一覧を描画する関数です（キャラクター名リンク用）。
      function renderRelationLinks(container, items, createLinkElement, emptyText) {
        container.innerHTML = "";
        if (!items || items.length === 0) {
          const emptyLabel = document.createElement("span");
          emptyLabel.className = "relation-empty";
          emptyLabel.textContent = emptyText;
          container.appendChild(emptyLabel);
          return;
        }
        items.forEach((item) => {
          container.appendChild(createLinkElement(item));
        });
      }

      // キャラクター名から、キャラクター一覧へのリンク要素を作る関数です。
      function createCharacterLinkElement(characterName) {
        const link = document.createElement("a");
        link.className = "relation-link";
        link.href = `characters.html?v=20260424-5&character=${encodeURIComponent(
          characterName
        )}`;
        link.textContent = characterName;
        return link;
      }

      // 詳細パネルを初期状態（未選択）に戻す関数です。
      function resetDetailPanel() {
        detailPanelElement.classList.add("is-empty");
        detailTitleElement.textContent = "作品を選択してください";
        detailReleaseDateElement.textContent = "発売日: -";
        detailCategoryElement.textContent = "分類: -";
        detailSummaryElement.textContent =
          "左側の作品名を押すと、ここに詳細情報が表示されます。";
        detailDescriptionElement.textContent = "";
        detailDescriptionElement.hidden = true;
        closePanelButtonElement.disabled = true;
        renderRelationLinks(
          detailCharactersElement,
          [],
          createCharacterLinkElement,
          "作品を選択すると表示されます。"
        );
      }

      // 作品データを受け取り、詳細サイドパネルに表示する関数です。
      function showDetailPanel(work) {
        detailPanelElement.classList.remove("is-empty");
        detailTitleElement.textContent = work.title;
        detailReleaseDateElement.textContent = `発売日: ${work.releaseDate}`;
        detailCategoryElement.textContent = `分類: ${formatWorkCategories(work)}`;
        detailSummaryElement.textContent = work.summary;
        detailDescriptionElement.textContent = work.description || "";
        detailDescriptionElement.hidden = !work.description;
        closePanelButtonElement.disabled = false;
        renderRelationLinks(
          detailCharactersElement,
          work.characters,
          createCharacterLinkElement,
          "登録なし"
        );
      }

      // 選択中カードを見える位置までスクロールする関数です。
      function scrollToSelectedWorkCard() {
        const selectedCard = worksListElement.querySelector(".work-card.is-selected");
        if (selectedCard) {
          selectedCard.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      // 受け取った作品データ配列を画面に描画する関数です。
      function renderWorks(works) {
        // いったん表示を空にしてから、最新の結果だけ表示します。
        worksListElement.innerHTML = "";
        currentDisplayedWorks = works;

        works.forEach((work) => {
          // articleタグで、作品1件分のまとまりを表します。
          const card = document.createElement("article");
          card.className = "work-card";
          if (work.title === selectedWorkTitle) {
            card.classList.add("is-selected");
          }

          // 作品名はボタンにして、押すと右側パネルに詳細を表示できるようにします。
          const titleButton = document.createElement("button");
          titleButton.type = "button";
          titleButton.className = "work-title-button";
          titleButton.textContent = work.title;
          titleButton.addEventListener("click", () => {
            selectedWorkTitle = work.title;
            showDetailPanel(work);
            // 選択中のカードを見た目で分かるように再描画します。
            renderWorks(currentDisplayedWorks);
          });

          const releaseDateElement = document.createElement("p");
          releaseDateElement.className = "work-meta";
          releaseDateElement.textContent = `発売日: ${work.releaseDate}`;

          const categoryElement = document.createElement("p");
          categoryElement.className = "work-meta";
          categoryElement.textContent = `分類: ${formatWorkCategories(work)}`;

          const summaryElement = document.createElement("p");
          summaryElement.className = "work-summary";
          summaryElement.textContent = work.summary;

          card.appendChild(titleButton);
          card.appendChild(releaseDateElement);
          card.appendChild(categoryElement);
          card.appendChild(summaryElement);

          // 作ったカードを一覧エリアの最後に追加します。
          worksListElement.appendChild(card);
        });

        // 結果が0件ならメッセージを表示し、1件以上なら隠します。
        emptyMessageElement.hidden = works.length !== 0;

        // URL指定などでスクロールしたいタイミングだけ実行します。
        if (shouldScrollToSelectedWork) {
          scrollToSelectedWorkCard();
          shouldScrollToSelectedWork = false;
        }
      }

      // 検索・絞り込み条件を使って、表示する作品を作る関数です。
      function updateWorksView() {
        const searchKeyword = searchInputElement.value.trim().toLowerCase();
        const selectedCategory = categorySelectElement.value;
        const selectedSort = sortSelectElement.value;

        // 1) カテゴリで絞り込み
        // 2) タイトルとあらすじで検索
        // 3) 選択された条件で並び替え
        const filteredWorks = worksData.filter((work) => {
          const workCategories = getWorkCategories(work);
          const isCategoryMatched =
            selectedCategory === "all" ||
            workCategories.includes(selectedCategory);
          const searchableText = [
            work.title,
            work.releaseDate,
            workCategories.join(" "),
            work.summary,
            work.description || ""
          ]
            .join(" ")
            .toLowerCase();
          const isSearchMatched = searchableText.includes(searchKeyword);
          return isCategoryMatched && isSearchMatched;
        });
        const filteredAndSortedWorks = sortWorks(filteredWorks, selectedSort);

        // URLに指定された作品名がある場合は、初回だけその作品を選択します。
        if (pendingInitialWorkTitle) {
          const initialWork = filteredAndSortedWorks.find(
            (work) => work.title === pendingInitialWorkTitle
          );
          if (initialWork) {
            selectedWorkTitle = initialWork.title;
            showDetailPanel(initialWork);
            shouldScrollToSelectedWork = true;
          } else {
            selectedWorkTitle = null;
            resetDetailPanel();
          }
          pendingInitialWorkTitle = null;
        } else {
          // 絞り込み後の一覧に選択中の作品が存在しない場合、詳細表示を閉じます。
          const selectedWork = filteredAndSortedWorks.find(
            (work) => work.title === selectedWorkTitle
          );
          if (!selectedWork) {
            selectedWorkTitle = null;
            resetDetailPanel();
          } else {
            showDetailPanel(selectedWork);
          }
        }

        renderWorks(filteredAndSortedWorks);
      }

      // 入力が変わるたびに再描画します。
      searchInputElement.addEventListener("input", updateWorksView);
      categorySelectElement.addEventListener("change", updateWorksView);
      sortSelectElement.addEventListener("change", updateWorksView);
      closePanelButtonElement.addEventListener("click", () => {
        selectedWorkTitle = null;
        resetDetailPanel();
        renderWorks(currentDisplayedWorks);
      });

      // 初期表示時も、同じ処理で表示します。
      applyInitialWorkSelectionFromQuery();
      resetDetailPanel();
      updateWorksView();
    </script>
    <!-- 共通ハンバーガーメニューの開閉とリンク描画を担当するJSです -->
    <script src="menu.js?v=20260424-5"></script>
  </body>
</html>
